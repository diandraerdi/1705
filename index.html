  :root{
    --bg:#000000;
    --bg-elevated:#1C1C1E;
    --bg-elevated-2:#2C2C2E;
    --bg-elevated-3:#3A3A3C;
    --separator: rgba(255,255,255,0.08);
    --label:#FFFFFF;
    --label-secondary: rgba(235,235,245,0.6);
    --label-tertiary: rgba(235,235,245,0.3);
    --blue:#CCF180;
    --green:#30D158;
    --red:#FF453A;
    --orange:#FF9F0A;
    --purple:#BF5AF2;
    --page-outer:#0b0b0c;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ height:100%; margin:0; overflow:hidden; }
  body{
    background: var(--page-outer);
    font-family: 'Stack Sans Text', -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    color: var(--label);
    display:flex; justify-content:center;
  }
  #shell{
    width:100%; max-width:480px; height:100vh; height:100dvh;
    background: var(--bg);
    position:relative;
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  #topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: calc(14px + env(safe-area-inset-top)) 16px 8px 16px;
    flex-shrink:0;
  }
  #topbar h1{ font-size:20px; font-weight:700; margin:0; letter-spacing:-0.4px; }
  .icon-btn{
    width:34px; height:34px; border-radius:50%;
    background: var(--bg-elevated-2);
    border:none; color: var(--label);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .icon-btn:active{ transform: scale(0.92); }
  #scroll-area{
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding: 4px 16px 110px 16px;
  }
  #scroll-area::-webkit-scrollbar{ display:none; }

  /* Balance card */
  .balance-card{
    padding: 22px 4px 10px 4px;
  }
  .balance-label{
    font-size:11px; color: var(--label-secondary); font-weight:600;
    text-transform:uppercase; letter-spacing:0.5px;
    display:flex; align-items:center; gap:6px;
  }
  .balance-amount{
    font-size:38px; font-weight:700; letter-spacing:-1px; margin-top:6px;
    font-variant-numeric: tabular-nums;
  }
  .balance-sub{ font-size:11px; color: var(--label-secondary); margin-top:4px; }
  .eye-btn{ background:none; border:none; color:var(--label-secondary); cursor:pointer; padding:2px; display:flex; }

  /* Section headers */
  .section{ margin-top:26px; }
  .section-head{ display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:10px; padding: 0 2px; }
  .section-title{ font-size:18px; font-weight:700; letter-spacing:-0.3px; min-width:0; }
  .section-action{ font-size:12px; color: var(--blue); font-weight:600; background:none; border:none; cursor:pointer; flex-shrink:0; white-space:nowrap; }

  /* Accounts row */
  .accounts-row{ display:flex; gap:12px; overflow-x:auto; overflow-y:visible; padding: 2px 2px 6px 2px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .accounts-row::-webkit-scrollbar{ display:none; }
  .account-card{
    min-width:160px; background: var(--bg-elevated); border-radius:16px; padding:14px;
    flex-shrink:0; cursor:pointer;
  }
  .account-card:active{ transform: scale(0.97); }
  .account-type-badge{
    display:inline-block; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.3px;
    color: var(--purple); background: rgba(191,90,242,0.15); padding:3px 8px; border-radius:6px; margin-bottom:10px;
  }
  .account-type-badge.savings{ color: var(--blue); background: rgba(204,241,128,0.15); }
  .account-name{ font-size:12px; font-weight:600; color: var(--label-secondary); }
  .account-balance{ font-size:17px; font-weight:700; margin-top:4px; font-variant-numeric: tabular-nums; }
  .add-account-card{
    min-width:110px; background: var(--bg-elevated); border-radius:16px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    flex-shrink:0; cursor:pointer; color: var(--blue); border: 1px dashed var(--bg-elevated-3);
  }
  .add-account-card span{ font-size:10px; font-weight:600; }
  .add-account-full{
    width:100%; background: var(--bg-elevated); border-radius:16px; border: 1px dashed var(--bg-elevated-3);
    color: var(--blue); font-size:13px; font-weight:600; font-family:inherit; padding:18px;
    display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;
  }
  .add-account-full:active{ transform: scale(0.98); }

  /* Person spend cards */
  .spend-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .spend-all-card{ background: var(--bg-elevated); border-radius:16px; padding:14px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; }
  .spend-all-label{ font-size:12px; font-weight:600; color: var(--label-secondary); text-transform:uppercase; letter-spacing:0.4px; }
  .spend-all-amount{ font-size:19px; font-weight:700; font-variant-numeric: tabular-nums; }
  .more-btn{ width:100%; padding:13px; background: var(--bg-elevated); color: var(--blue); border:none; border-radius:14px; font-size:12px; font-weight:600; font-family:inherit; cursor:pointer; margin-top:2px; }
  .more-btn:active{ transform: scale(0.98); }
  .history-header{ display:flex; align-items:center; gap:10px; padding: 6px 2px 20px 2px; position:relative; }
  .back-btn{ display:flex; align-items:center; gap:2px; background:none; border:none; color: var(--blue); font-size:13px; font-weight:600; cursor:pointer; padding:4px 4px 4px 0; font-family:inherit; }
  .history-title{ font-size:17px; font-weight:700; position:absolute; left:50%; transform:translateX(-50%); }
  .spend-card{ background: var(--bg-elevated); border-radius:16px; padding:14px; }
  .spend-person{ display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .avatar{ width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; flex-shrink:0; }
  .avatar.p1{ background: rgba(204,241,128,0.2); color: var(--blue); }
  .avatar.p2{ background: rgba(255,69,58,0.2); color: var(--red); }
  .spend-name{ font-size:11px; font-weight:600; color: var(--label-secondary); }
  .spend-amount{ font-size:16px; font-weight:700; font-variant-numeric: tabular-nums; }

  /* Budgets */
  .budget-row{ background: var(--bg-elevated); border-radius:16px; padding:14px; margin-bottom:10px; cursor:pointer; }
  .budget-row:active{ transform: scale(0.98); }
  .budget-top{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
  .budget-cat{ font-size:13px; font-weight:600; }
  .budget-figures{ font-size:11px; color: var(--label-secondary); }
  .budget-figures b{ color: var(--label); font-weight:600; }
  .budget-bar-track{ height:6px; background: var(--bg-elevated-3); border-radius:3px; overflow:hidden; }
  .budget-bar-fill{ height:100%; border-radius:3px; background: var(--green); }

  /* Transactions */
  .tx-date-label{ font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color: var(--label-tertiary); margin: 14px 2px 8px 2px; }
  .tx-date-label:first-child{ margin-top:0; }
  .tx-row{ display:flex; align-items:center; gap:12px; background: var(--bg-elevated); border-radius:14px; padding:12px 14px; margin-bottom:8px; cursor:pointer; }
  .tx-row:active{ transform: scale(0.98); }
  .tx-icon{ width:38px; height:38px; border-radius:50%; background: var(--bg-elevated-3); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .tx-mid{ flex:1; min-width:0; }
  .tx-cat{ font-size:13px; font-weight:600; }
  .tx-sub{ font-size:10.5px; color: var(--label-secondary); margin-top:2px; }
  .tx-amt{ font-size:13px; font-weight:700; font-variant-numeric: tabular-nums; flex-shrink:0; }
  .tx-amt.expense{ color: var(--label); }
  .tx-amt.income{ color: var(--green); }

  .empty-state{ text-align:center; padding: 26px 10px; color: var(--label-secondary); font-size:12px; background: var(--bg-elevated); border-radius:16px; }
  .empty-state button{ margin-top:12px; }

  /* FAB */
  #fab{
    position:absolute; bottom:calc(28px + env(safe-area-inset-bottom)); right:calc(22px + env(safe-area-inset-right)); width:58px; height:58px; border-radius:50%;
    background: var(--blue); border:none; color:#084734; font-size:26px; font-weight:400;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow: 0 6px 18px rgba(204,241,128,0.35);
    z-index:20;
  }
  #fab:active{ transform: scale(0.92); }

  /* Sheets */
  .sheet-overlay{
    position:absolute; inset:0; background: rgba(0,0,0,0.55);
    display:flex; align-items:flex-end; z-index:50;
    opacity:0; pointer-events:none; transition: opacity 0.25s ease;
  }
  .sheet-overlay.open{ opacity:1; pointer-events:auto; }
  .sheet{
    width:100%; max-height:88%; background: var(--bg-elevated); border-radius:20px 20px 0 0;
    padding: 10px 16px calc(26px + env(safe-area-inset-bottom)) 16px; display:flex; flex-direction:column;
    transform: translateY(100%); transition: transform 0.28s cubic-bezier(.32,.72,0,1);
    overflow-y:auto;
  }
  .sheet-overlay.open .sheet{ transform: translateY(0); }
  .sheet-handle{ width:36px; height:5px; background: var(--bg-elevated-3); border-radius:3px; margin: 4px auto 14px auto; }
  .sheet-title{ font-size:17px; font-weight:700; margin: 0 0 18px 0; text-align:center; letter-spacing:-0.3px; }

  label.field-label{ font-size:11px; font-weight:600; color: var(--label-secondary); margin: 16px 2px 8px 2px; display:block; }
  label.field-label:first-of-type{ margin-top:0; }
  input[type=text], input[type=number], input[type=date], select.plain{
    width:100%; background: var(--bg-elevated-2); border:none; border-radius:12px; padding:13px 14px;
    color: var(--label); font-size:14px; font-family:inherit;
  }
  input::placeholder{ color: var(--label-tertiary); }
  input:focus, select:focus{ outline:2px solid var(--blue); }

  .amount-input-wrap{ display:flex; align-items:center; background: var(--bg-elevated-2); border-radius:14px; padding: 14px; }
  .amount-input-wrap span{ font-size:22px; font-weight:700; color: var(--label-secondary); margin-right:6px; }
  .amount-input-wrap input{ background:none; border:none; padding:0; font-size:26px; font-weight:700; width:100%; }
  .amount-input-wrap input:focus{ outline:none; }

  .segmented{ display:flex; background: var(--bg-elevated-2); border-radius:10px; padding:3px; gap:3px; }
  .segmented button{
    flex:1; border:none; background:none; color: var(--label-secondary); font-size:12px; font-weight:600;
    padding: 9px 6px; border-radius:8px; cursor:pointer; font-family:inherit;
  }
  .segmented button.active{ background: var(--bg-elevated-3); color: var(--label); }

  .cat-grid{ display:grid; grid-template-columns: repeat(4,1fr); gap:10px; }
  .cat-chip{
    display:flex; flex-direction:column; align-items:center; gap:6px; padding: 10px 4px;
    border-radius:14px; background: var(--bg-elevated-2); border: 2px solid transparent; cursor:pointer;
  }
  .cat-chip.active{ border-color: var(--blue); background: rgba(204,241,128,0.15); }
  .cat-chip .ic{ font-size:20px; }
  .cat-chip .lb{ font-size:9px; font-weight:600; color: var(--label-secondary); text-align:center; line-height:1.2; }
  .cat-chip.active .lb{ color: var(--label); }

  .account-pick{ display:flex; flex-direction:column; gap:8px; }
  .account-pick-item{ display:flex; align-items:center; justify-content:space-between; background: var(--bg-elevated-2); padding:12px 14px; border-radius:12px; cursor:pointer; border:2px solid transparent; }
  .account-pick-item.active{ border-color: var(--blue); }
  .account-pick-item .n{ font-size:12px; font-weight:600; }
  .account-pick-item .b{ font-size:11px; color: var(--label-secondary); }

  .btn-primary{
    width:100%; padding:15px; background: var(--blue); color:#084734; border:none; border-radius:14px;
    font-size:14px; font-weight:700; font-family:inherit; cursor:pointer; margin-top:22px;
  }
  .btn-primary:active{ transform: scale(0.98); }
  .btn-primary.danger{ background: var(--red); }
  .btn-secondary{
    width:100%; padding:15px; background: var(--bg-elevated-2); color: var(--label); border:none; border-radius:14px;
    font-size:14px; font-weight:600; font-family:inherit; cursor:pointer; margin-top:10px;
  }
  .btn-text-danger{
    width:100%; padding:13px; background:none; color: var(--red); border:none; font-size:13px; font-weight:600;
    font-family:inherit; cursor:pointer; margin-top:6px;
  }
  .field-error{ color: var(--red); font-size:10.5px; margin-top:8px; text-align:center; }
  .hint{ font-size:10px; color:var(--label-tertiary); margin-top:6px; padding: 0 2px; }
  .setup-banner{
    display:none; margin: 0 16px 4px 16px; padding:10px 12px; background: rgba(255,159,10,0.15);
    color: var(--orange); font-size:10.5px; border-radius:10px; font-weight:600;
  }
  .setup-banner:not(:empty){ display:block; }

  .choice-card{
    width:100%; display:flex; align-items:center; gap:14px; text-align:left;
    background: var(--bg-elevated-2); border:none; border-radius:16px; padding:16px;
    margin-bottom:12px; cursor:pointer; font-family:inherit;
  }
  .choice-card:active{ transform: scale(0.98); }
  .choice-ic{ font-size:24px; width:44px; height:44px; border-radius:12px; background: var(--bg-elevated-3); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .choice-title{ font-size:13.5px; font-weight:700; color: var(--label); }
  .choice-sub{ font-size:10.5px; color: var(--label-secondary); margin-top:2px; }

  .spinner{
    width:32px; height:32px; border-radius:50%; border:3px solid var(--bg-elevated-3); border-top-color: var(--blue);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .skip-toggle-row{ display:flex; align-items:center; justify-content:space-between; padding: 4px 2px 12px 2px; font-size:12px; color: var(--label-secondary); }
  .switch{ width:46px; height:28px; border-radius:14px; background: var(--bg-elevated-3); border:none; position:relative; cursor:pointer; flex-shrink:0; padding:0; }
  .switch .knob{ position:absolute; top:2px; left:2px; width:24px; height:24px; border-radius:50%; background:#fff; transition: left 0.18s ease; }
  .switch.on{ background: var(--green); }
  .switch.on .knob{ left:20px; }
</style>
</head>
<body>
<div id="shell">
  <div id="topbar">
    <svg width="76" height="38" viewBox="0 0 76 38" role="img" aria-label="1705" style="display:block;">
      <polygon points="0,0 76,0 76,25 63,38 0,38" fill="#084734"></polygon>
      <text x="34" y="25" text-anchor="middle" font-family="'Stack Sans Text', sans-serif" font-weight="700" font-size="16" letter-spacing="0.5" fill="#CCF180">1705</text>
    </svg>
    <button class="icon-btn" id="settingsBtn" aria-label="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </div>
  <div id="setupBanner" class="setup-banner"></div>
  <div id="scroll-area"></div>
  <button id="fab" aria-label="Add transaction">+</button>
  <div id="sheetHost"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
const CURRENCY_LOCALE = 'id-ID';

const EXPENSE_CATS = [
  {id:'groceries', label:'Groceries', icon:'🛒'},
  {id:'dining', label:'Dining', icon:'🍽️'},
  {id:'transport', label:'Transport', icon:'🚗'},
  {id:'bills', label:'Bills', icon:'💡'},
  {id:'housing', label:'Housing', icon:'🏠'},
  {id:'shopping', label:'Shopping', icon:'🛍️'},
  {id:'health', label:'Health', icon:'💊'},
  {id:'entertainment', label:'Fun', icon:'🎬'},
  {id:'education', label:'Education', icon:'📚'},
  {id:'kids', label:'Kids', icon:'🧸'},
  {id:'tofu', label:'Tofu', icon:'🐶'},
  {id:'transfer', label:'Transfer', icon:'🔁'},
  {id:'other', label:'Other', icon:'📦'},
];
const INCOME_CATS = [
  {id:'salary', label:'Salary', icon:'💼'},
  {id:'bonus', label:'Bonus', icon:'🎁'},
  {id:'investment', label:'Investment', icon:'📈'},
  {id:'gift', label:'Gift', icon:'🎀'},
  {id:'refund', label:'Refund', icon:'↩️'},
  {id:'other_income', label:'Other', icon:'📦'},
];

const firebaseConfig = {
  apiKey: "AIzaSyD1T7eUd0lrwQoTX7lK3PpSKw0-YgIAAgo",
  authDomain: "finance-60945.firebaseapp.com",
  projectId: "finance-60945",
  storageBucket: "finance-60945.firebasestorage.app",
  messagingSenderId: "515999229915",
  appId: "1:515999229915:web:4ed05b7c89bb83344329fe"
};
const FIREBASE_CONFIGURED = firebaseConfig.apiKey !== "PASTE_YOUR_API_KEY";
let db = null;

let state = {
  accounts: [],
  transactions: [],
  budgets: [],
  settings: { person1: 'Me', person2: 'Wife', currency: 'Rp' }
};
let ui = { showBalance: true, view: 'home', spendFilter: { range: 'this_month', customStart: null, customEnd: null, categories: [] } };

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

function defaultState(){
  return { accounts: [], transactions: [], budgets: [], settings: { person1: 'Me', person2: 'Wife', currency: 'Rp' } };
}

async function loadState(){
  if(!FIREBASE_CONFIGURED){
    showSetupBanner();
    render();
    return;
  }
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    await firebase.auth().signInAnonymously();
    const docRef = db.collection('family-finance').doc('shared-data');
    docRef.onSnapshot((doc)=>{
      if(doc.exists){
        state = Object.assign(defaultState(), doc.data());
      }
      clearSetupBanner();
      render();
    }, (err)=>{
      console.error('Sync error', err);
      showSetupBanner('Could not connect. Check your Firebase config and security rules.');
      render();
    });
  }catch(e){
    console.error('Firebase init failed', e);
    showSetupBanner('Could not connect. Check your Firebase config.');
    render();
  }
}

async function saveState(){
  if(!FIREBASE_CONFIGURED || !db) return;
  try{
    await db.collection('family-finance').doc('shared-data').set(state);
  }catch(e){
    console.error('Save failed', e);
  }
}

function showSetupBanner(customMsg){
  const el = document.getElementById('setupBanner');
  if(el) el.textContent = customMsg || "This app isn't connected to a database yet. Open the code and add your Firebase config to start saving data.";
}

function clearSetupBanner(){
  const el = document.getElementById('setupBanner');
  if(el) el.textContent = '';
}

function fmt(n){
  const v = Math.round(Number(n)||0);
  return state.settings.currency + ' ' + v.toLocaleString(CURRENCY_LOCALE);
}

function allCats(type){ return type === 'income' ? INCOME_CATS : EXPENSE_CATS; }
function catInfo(type, id){
  return allCats(type).find(c=>c.id===id) || {label:'Other', icon:'📦'};
}
function personName(key){ return key === 'p2' ? state.settings.person2 : state.settings.person1; }
function personInitial(key){ return personName(key).trim().charAt(0).toUpperCase() || '?'; }

function totalBalance(){ return state.accounts.reduce((s,a)=>s + Number(a.balance||0), 0); }

function isThisMonth(dateStr){
  const d = new Date(dateStr);
  const now = new Date();
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
}

function getRangeBounds(filter){
  const now = new Date();
  let start, end;
  if(filter.range === 'last_month'){
    start = new Date(now.getFullYear(), now.getMonth()-1, 1);
    end = new Date(now.getFullYear(), now.getMonth(), 0, 23,59,59);
  } else if(filter.range === 'this_year'){
    start = new Date(now.getFullYear(), 0, 1);
    end = new Date(now.getFullYear(), 11, 31, 23,59,59);
  } else if(filter.range === 'custom'){
    start = filter.customStart ? new Date(filter.customStart+'T00:00:00') : new Date(0);
    end = filter.customEnd ? new Date(filter.customEnd+'T23:59:59') : now;
  } else {
    start = new Date(now.getFullYear(), now.getMonth(), 1);
    end = new Date(now.getFullYear(), now.getMonth()+1, 0, 23,59,59);
  }
  return { start, end };
}

function inFilterRange(dateStr, filter){
  const { start, end } = getRangeBounds(filter);
  const d = new Date(dateStr+'T12:00:00');
  return d >= start && d <= end;
}

function shortDate(dateStr){
  const d = new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
}

function filterLabel(filter){
  if(filter.range === 'last_month') return "Last month's expenses";
  if(filter.range === 'this_year') return "This year's expenses";
  if(filter.range === 'custom'){
    if(filter.customStart && filter.customEnd) return 'Expenses: ' + shortDate(filter.customStart) + ' – ' + shortDate(filter.customEnd);
    return 'Expenses: custom range';
  }
  return "This month's expenses";
}

function filteredSpend(){
  const out = { p1:0, p2:0, all:0 };
  const filter = ui.spendFilter;
  state.transactions.forEach(t=>{
    if(t.type!=='expense') return;
    if(!inFilterRange(t.date, filter)) return;
    if(filter.categories.length && !filter.categories.includes(t.category)) return;
    out[t.person] = (out[t.person]||0) + Number(t.amount);
    out.all += Number(t.amount);
  });
  return out;
}

function budgetSpent(categoryId){
  return state.transactions.filter(t=>t.type==='expense' && t.category===categoryId && isThisMonth(t.date))
    .reduce((s,t)=>s+Number(t.amount),0);
}

function dateLabel(dateStr){
  const d = new Date(dateStr);
  const today = new Date();
  const yest = new Date(); yest.setDate(today.getDate()-1);
  const sameDay = (a,b)=> a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  if(sameDay(d, today)) return 'Today';
  if(sameDay(d, yest)) return 'Yesterday';
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'long', year: d.getFullYear()!==today.getFullYear() ? 'numeric' : undefined });
}

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ---------- RENDER ----------
function renderTxRow(t){
  const info = catInfo(t.type, t.category);
  const acc = state.accounts.find(a=>a.id===t.accountId);
  return `<div class="tx-row" data-tx="${t.id}">
    <div class="tx-icon">${info.icon}</div>
    <div class="tx-mid">
      <div class="tx-cat">${info.label}</div>
      <div class="tx-sub">${esc(personName(t.person))} · ${esc(acc ? acc.name : 'No account')}${t.note ? ' · '+esc(t.note) : ''}</div>
    </div>
    <div class="tx-amt ${t.type}">${t.type==='income' ? '+' : '−'}${fmt(t.amount)}</div>
  </div>`;
}

function renderTxList(list){
  let html = '';
  let lastLabel = null;
  list.forEach(t=>{
    const lbl = dateLabel(t.date);
    if(lbl !== lastLabel){ html += `<div class="tx-date-label">${lbl}</div>`; lastLabel = lbl; }
    html += renderTxRow(t);
  });
  return html;
}

function sortedTransactions(){
  return [...state.transactions].sort((a,b)=> new Date(b.date) - new Date(a.date) || (b.createdAt||0)-(a.createdAt||0));
}

function renderHistoryView(){
  const sorted = sortedTransactions();
  let html = `<div class="history-header">
    <button class="back-btn" id="backBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Back
    </button>
    <div class="history-title">All activity</div>
  </div>`;
  if(sorted.length === 0){
    html += `<div class="empty-state">No transactions yet.</div>`;
  } else {
    html += renderTxList(sorted);
  }
  return html;
}

function render(){
  const root = document.getElementById('scroll-area');

  if(ui.view === 'history'){
    root.innerHTML = renderHistoryView();
    document.getElementById('backBtn').onclick = ()=>{ ui.view = 'home'; render(); };
    document.querySelectorAll('[data-tx]').forEach(el=>{
      el.onclick = ()=> openTxDetailSheet(el.getAttribute('data-tx'));
    });
    return;
  }

  const bal = totalBalance();
  const spend = filteredSpend();

  let html = '';

  // Balance card
  html += `<div class="balance-card">
    <div class="balance-label">
      Total balance
      <button class="eye-btn" id="eyeBtn">${ui.showBalance ? eyeOpenSVG() : eyeClosedSVG()}</button>
    </div>
    <div class="balance-amount">${ui.showBalance ? fmt(bal) : '••••••'}</div>
    <div class="balance-sub">${state.accounts.length} account${state.accounts.length===1?'':'s'}</div>
  </div>`;

  // Accounts
  html += `<div class="section">
    <div class="section-head"><div class="section-title">Accounts</div></div>`;
  if(state.accounts.length === 0){
    html += `<button class="add-account-full" id="addAccountCard">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Add your first account
    </button>`;
  } else {
    html += `<div class="accounts-row">`;
    state.accounts.forEach(a=>{
      html += `<div class="account-card" data-account="${a.id}">
        <div class="account-type-badge ${a.type==='Regular Savings'?'savings':''}">${a.type==='Regular Savings' ? 'Savings' : 'Term deposit'}</div>
        <div class="account-name">${esc(a.name)}</div>
        <div class="account-balance">${ui.showBalance ? fmt(a.balance) : '••••'}</div>
      </div>`;
    });
    html += `<div class="add-account-card" id="addAccountCard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        <span>Add account</span>
      </div>`;
    html += `</div>`;
  }
  html += `</div>`;

  // Spend by person, filterable
  html += `<div class="section">
    <div class="section-head">
      <div class="section-title">${esc(filterLabel(ui.spendFilter))}</div>
      <button class="section-action" id="spendFilterBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:3px;"><path d="M4 6h16M7 12h10M10 18h4"/></svg>Filter
      </button>
    </div>
    <div class="spend-all-card">
      <div class="spend-all-label">All</div>
      <div class="spend-all-amount">${fmt(spend.all||0)}</div>
    </div>
    <div class="spend-grid">
      <div class="spend-card">
        <div class="spend-person"><div class="avatar p1">${esc(personInitial('p1'))}</div><div class="spend-name">${esc(state.settings.person1)}</div></div>
        <div class="spend-amount">${fmt(spend.p1||0)}</div>
      </div>
      <div class="spend-card">
        <div class="spend-person"><div class="avatar p2">${esc(personInitial('p2'))}</div><div class="spend-name">${esc(state.settings.person2)}</div></div>
        <div class="spend-amount">${fmt(spend.p2||0)}</div>
      </div>
    </div>
  </div>`;

  // Budgets
  html += `<div class="section">
    <div class="section-head">
      <div class="section-title">Budgets</div>
      <button class="section-action" id="addBudgetBtn">+ Add</button>
    </div>`;
  if(state.budgets.length === 0){
    html += `<div class="empty-state">No budgets yet. Set a monthly limit per category to track your spending.</div>`;
  } else {
    state.budgets.forEach(b=>{
      const spent = budgetSpent(b.category);
      const pct = Math.min(100, Math.round((spent / Math.max(1,b.limit))*100));
      const info = catInfo('expense', b.category);
      const over = spent > b.limit;
      html += `<div class="budget-row" data-budget="${b.id}">
        <div class="budget-top">
          <div class="budget-cat">${info.icon} ${info.label}</div>
          <div class="budget-figures"><b>${fmt(spent)}</b> / ${fmt(b.limit)}</div>
        </div>
        <div class="budget-bar-track"><div class="budget-bar-fill" style="width:${pct}%; background:${over ? 'var(--red)' : (pct>80?'var(--orange)':'var(--green)')}"></div></div>
      </div>`;
    });
  }
  html += `</div>`;

  // Transactions (capped at 5, with a link to the full history)
  const sortedAll = sortedTransactions();
  html += `<div class="section">
    <div class="section-head"><div class="section-title">Recent activity</div></div>`;
  if(sortedAll.length === 0){
    html += `<div class="empty-state">No transactions yet. Tap the + button to add your first expense or income.</div>`;
  } else {
    html += renderTxList(sortedAll.slice(0,5));
    if(sortedAll.length > 5){
      html += `<button class="more-btn" id="moreActivityBtn">See all activity (${sortedAll.length})</button>`;
    }
  }
  html += `</div>`;

  root.innerHTML = html;
  attachHomeListeners();
}

// ---------- SHEET FRAMEWORK ----------
function showSheet(innerHtml, onMount){
  const host = document.getElementById('sheetHost');
  const wrap = document.createElement('div');
  wrap.className = 'sheet-overlay';
  wrap.innerHTML = `<div class="sheet"><div class="sheet-handle"></div>${innerHtml}</div>`;
  host.appendChild(wrap);
  wrap.addEventListener('click', (e)=>{ if(e.target === wrap) closeSheet(wrap); });
  requestAnimationFrame(()=> wrap.classList.add('open'));
  if(onMount) onMount(wrap);
  return wrap;
}
function closeSheet(wrap){
  wrap.classList.remove('open');
  setTimeout(()=> wrap.remove(), 280);
}

  showSheet(html, (wrap)=>{

function openAddChooserSheet(){

function fileToBase64(file){
  return new Promise((resolve, reject)=>{
    const r = new FileReader();
    r.onload = ()=> resolve(r.result);
    r.onerror = ()=> reject(new Error('Could not read file'));
    r.readAsDataURL(file);
  });
}

async function handleReceiptFile(file){
  let photoUrl = null;
  try{ photoUrl = await fileToBase64(file); }catch(e){ photoUrl = null; }
  openAddTxSheet({ txType:'expense', photoUrl });
}

function openAddTxSheet(opts){
  opts = opts || {};
  const prefill = opts.prefill || {};
  let txType = opts.txType || 'expense';
  let category = prefill.category || allCats(txType)[0].id;
  let person = 'p1';
  let skipAccount = state.accounts.length === 0;
  let accountId = state.accounts.length ? state.accounts[0].id : null;

  function bodyHtml(){
    const cats = allCats(txType);
    return `
      ${opts.photoUrl ? `<img src="${opts.photoUrl}" alt="Receipt photo" style="width:100%; max-height:200px; object-fit:contain; border-radius:12px; margin-bottom:14px; background:var(--bg-elevated-2);">` : ''}
      <label class="field-label" style="margin-top:0">Type</label>
      <div class="segmented" id="txTypeSeg">
        <button data-val="expense" class="${txType==='expense'?'active':''}">Expense</button>
        <button data-val="income" class="${txType==='income'?'active':''}">Income</button>
      </div>
      <label class="field-label">Amount</label>
      <div class="amount-input-wrap"><span>${state.settings.currency}</span><input type="number" id="txAmount" placeholder="0" inputmode="decimal" value="${prefill.amount != null ? prefill.amount : ''}"></div>
      <label class="field-label">Category</label>
      <div class="cat-grid" id="catGrid">
        ${cats.map(c=>`<div class="cat-chip ${c.id===category?'active':''}" data-cat="${c.id}"><div class="ic">${c.icon}</div><div class="lb">${c.label}</div></div>`).join('')}
      </div>
      <label class="field-label">Added by</label>
      <div class="segmented" id="personSeg">
        <button data-val="p1" class="${person==='p1'?'active':''}">${esc(state.settings.person1)}</button>
        <button data-val="p2" class="${person==='p2'?'active':''}">${esc(state.settings.person2)}</button>
      </div>
      <label class="field-label">${txType==='expense' ? 'From account' : 'To account'}</label>
      <div class="skip-toggle-row" id="skipToggleRow">
        <span>${txType==='expense' ? "Don't deduct from any account" : "Don't add to any account"}</span>
        <button class="switch ${skipAccount?'on':''}" id="skipToggle" role="switch" aria-checked="${skipAccount}"><span class="knob"></span></button>
      </div>
      ${state.accounts.length === 0 ? `<div class="hint">You haven't added an account yet — this will be logged without affecting a balance.</div>` : `
      <div class="account-pick" id="accountPick" style="${skipAccount ? 'display:none;' : ''}">
        ${state.accounts.map(a=>`<div class="account-pick-item ${a.id===accountId?'active':''}" data-acc="${a.id}"><span class="n">${esc(a.name)}</span><span class="b">${fmt(a.balance)}</span></div>`).join('')}
      </div>`}
      <label class="field-label">Note (optional)</label>
      <input type="text" id="txNote" placeholder="Add a note" value="${esc(prefill.note||'')}">
      <label class="field-label">Date</label>
      <input type="date" id="txDate" value="${prefill.date || new Date().toISOString().slice(0,10)}">
      <div class="field-error" id="txErr"></div>
      <button class="btn-primary" id="txSave">Save ${txType === 'expense' ? 'expense' : 'income'}</button>
    `;
  }

  const wrap = showSheet(`<div class="sheet-title">Add transaction</div><div id="txBody">${bodyHtml()}</div>`, mount);

  function mount(wrap){
    bindBody(wrap);
  }

  function bindBody(wrap){
    wrap.querySelectorAll('#txTypeSeg button').forEach(b=>{
      b.onclick = ()=>{
        txType = b.getAttribute('data-val');
        category = allCats(txType)[0].id;
        wrap.querySelector('#txBody').innerHTML = bodyHtml();
        bindBody(wrap);
      };
    });
    wrap.querySelectorAll('#catGrid .cat-chip').forEach(chip=>{
      chip.onclick = ()=>{ category = chip.getAttribute('data-cat'); wrap.querySelectorAll('#catGrid .cat-chip').forEach(c=>c.classList.remove('active')); chip.classList.add('active'); };
    });
    wrap.querySelectorAll('#personSeg button').forEach(b=>{
      b.onclick = ()=>{ person = b.getAttribute('data-val'); wrap.querySelectorAll('#personSeg button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); };
    });
    const skipBtn = wrap.querySelector('#skipToggle');
    if(skipBtn){
      skipBtn.onclick = ()=>{
        skipAccount = !skipAccount;
        skipBtn.classList.toggle('on', skipAccount);
        skipBtn.setAttribute('aria-checked', skipAccount);
        const pick = wrap.querySelector('#accountPick');
        if(pick) pick.style.display = skipAccount ? 'none' : '';
      };
    }
    wrap.querySelectorAll('#accountPick .account-pick-item').forEach(item=>{
      item.onclick = ()=>{ accountId = item.getAttribute('data-acc'); wrap.querySelectorAll('#accountPick .account-pick-item').forEach(x=>x.classList.remove('active')); item.classList.add('active'); };
    });
    wrap.querySelector('#txSave').onclick = ()=>{
      const amount = parseFloat(wrap.querySelector('#txAmount').value || '0');
      const note = wrap.querySelector('#txNote').value.trim();
      const date = wrap.querySelector('#txDate').value || new Date().toISOString().slice(0,10);
      if(!amount || amount<=0){ wrap.querySelector('#txErr').textContent = 'Enter an amount greater than 0.'; return; }
      let acc = null;
      if(!skipAccount && state.accounts.length){
        acc = state.accounts.find(a=>a.id===accountId);
        if(!acc){ wrap.querySelector('#txErr').textContent = 'Select an account.'; return; }
      }
      state.transactions.push({ id: uid(), type: txType, amount, category, person, accountId: acc ? acc.id : null, note, date, createdAt: Date.now() });
      if(acc){ acc.balance = Number(acc.balance) + (txType==='income' ? amount : -amount); }
      saveState(); render(); closeSheet(wrap);
    };
  }
}

function openTxDetailSheet(txId){
  const t = state.transactions.find(x=>x.id===txId);
  if(!t) return;
  const info = catInfo(t.type, t.category);
  const acc = state.accounts.find(a=>a.id===t.accountId);
  const html = `
    <div class="sheet-title">${info.icon} ${info.label}</div>
    <div style="text-align:center; font-size:28px; font-weight:700; margin-bottom:18px;" class="${t.type==='income'?'':''}">${t.type==='income'?'+':'−'}${fmt(t.amount)}</div>
    <div style="background:var(--bg-elevated-2); border-radius:14px; padding:4px 14px;">
      <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--separator); font-size:12px;"><span style="color:var(--label-secondary)">Added by</span><span>${esc(personName(t.person))}</span></div>
      <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--separator); font-size:12px;"><span style="color:var(--label-secondary)">Account</span><span>${esc(acc ? acc.name : '—')}</span></div>
      <div style="display:flex; justify-content:space-between; padding:12px 0; ${t.note ? 'border-bottom:1px solid var(--separator);' : ''} font-size:12px;"><span style="color:var(--label-secondary)">Date</span><span>${esc(t.date)}</span></div>
      ${t.note ? `<div style="display:flex; justify-content:space-between; padding:12px 0; font-size:12px;"><span style="color:var(--label-secondary)">Note</span><span>${esc(t.note)}</span></div>` : ''}
    </div>
    <button class="btn-text-danger" id="txDelete">Delete transaction</button>
  `;
  showSheet(html, (wrap)=>{
    wrap.querySelector('#txDelete').onclick = ()=>{
      if(acc){ acc.balance = Number(acc.balance) - (t.type==='income' ? t.amount : -t.amount); }
      state.transactions = state.transactions.filter(x=>x.id!==txId);
      saveState(); render(); closeSheet(wrap);
    };
  });
}

function openSpendFilterSheet(){
  let range = ui.spendFilter.range;
  let customStart = ui.spendFilter.customStart;
  let customEnd = ui.spendFilter.customEnd;
  let categories = [...ui.spendFilter.categories];

  const RANGE_OPTIONS = [
    {id:'this_month', label:'This month'},
    {id:'last_month', label:'Last month'},
    {id:'this_year', label:'This year'},
    {id:'custom', label:'Custom range'},
  ];

  function bodyHtml(){
    return `
      <label class="field-label" style="margin-top:0">Date range</label>
      <div class="account-pick" id="rangePick">
        ${RANGE_OPTIONS.map(r=>`<div class="account-pick-item ${r.id===range?'active':''}" data-range="${r.id}"><span class="n">${r.label}</span></div>`).join('')}
      </div>
      ${range==='custom' ? `
      <label class="field-label">From</label>
      <input type="date" id="customStart" value="${customStart||''}">
      <label class="field-label">To</label>
      <input type="date" id="customEnd" value="${customEnd||''}">
      ` : ''}
      <label class="field-label">Categories</label>
      <div class="cat-grid" id="catFilterGrid">
        <div class="cat-chip ${categories.length===0?'active':''}" data-cat="__all__"><div class="ic">✨</div><div class="lb">All</div></div>
        ${EXPENSE_CATS.map(c=>`<div class="cat-chip ${categories.includes(c.id)?'active':''}" data-cat="${c.id}"><div class="ic">${c.icon}</div><div class="lb">${c.label}</div></div>`).join('')}
      </div>
      <button class="btn-primary" id="filterApply">Apply filter</button>
    `;
  }

  const wrap = showSheet(`<div class="sheet-title">Filter</div><div id="filterBody">${bodyHtml()}</div>`, (w)=>bind(w));

  function bind(wrap){
    wrap.querySelectorAll('#rangePick .account-pick-item').forEach(item=>{
      item.onclick = ()=>{
        range = item.getAttribute('data-range');
        wrap.querySelector('#filterBody').innerHTML = bodyHtml();
        bind(wrap);
      };
    });
    const csInput = wrap.querySelector('#customStart');
    const ceInput = wrap.querySelector('#customEnd');
    if(csInput) csInput.oninput = ()=>{ customStart = csInput.value; };
    if(ceInput) ceInput.oninput = ()=>{ customEnd = ceInput.value; };
    wrap.querySelectorAll('#catFilterGrid .cat-chip').forEach(chip=>{
      chip.onclick = ()=>{
        const catId = chip.getAttribute('data-cat');
        const allChip = wrap.querySelector('#catFilterGrid .cat-chip[data-cat="__all__"]');
        if(catId === '__all__'){
          categories = [];
          wrap.querySelectorAll('#catFilterGrid .cat-chip').forEach(c=>c.classList.remove('active'));
          allChip.classList.add('active');
        } else {
          const idx = categories.indexOf(catId);
          if(idx >= 0){ categories.splice(idx,1); chip.classList.remove('active'); }
          else { categories.push(catId); chip.classList.add('active'); }
          if(categories.length===0) allChip.classList.add('active'); else allChip.classList.remove('active');
        }
      };
    });
    wrap.querySelector('#filterApply').onclick = ()=>{
      ui.spendFilter = { range, customStart, customEnd, categories };
      render();
      closeSheet(wrap);
    };
  }
}

function openSettingsSheet(){
  const html = `
    <div class="sheet-title">Settings</div>
    <label class="field-label" style="margin-top:0">Person 1 name</label>
    <input type="text" id="p1Name" value="${esc(state.settings.person1)}">
    <label class="field-label">Person 2 name</label>
    <input type="text" id="p2Name" value="${esc(state.settings.person2)}">
    <label class="field-label">Currency symbol</label>
    <input type="text" id="curSym" value="${esc(state.settings.currency)}">
    <div class="hint">This data is shared between everyone who opens this app — that's how you and your partner see the same balances.</div>
    <button class="btn-primary" id="setSave">Save</button>
  `;
  showSheet(html, (wrap)=>{
    wrap.querySelector('#setSave').onclick = ()=>{
      const p1 = wrap.querySelector('#p1Name').value.trim() || 'Me';
      const p2 = wrap.querySelector('#p2Name').value.trim() || 'Partner';
      const cur = wrap.querySelector('#curSym').value.trim() || 'Rp';
      state.settings.person1 = p1; state.settings.person2 = p2; state.settings.currency = cur;
      saveState(); render(); closeSheet(wrap);
    };
  });
}

loadState();
</script>
